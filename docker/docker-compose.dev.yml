# docker/docker-compose.dev.yml
# Development Docker Compose для локальной разработки
# Без Nginx, прямой доступ к сервисам

version: '3.8'

services:
  postgres:
    image: dockerhub1.beget.ru/library/postgres:16-alpine
    container_name: cms_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload_dev
      POSTGRES_DB: payload_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - cms_dev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d payload_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Adminer для управления БД (опционально)
  adminer:
    image: dockerhub1.beget.ru/library/adminer:latest
    container_name: cms_adminer_dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - cms_dev_network
    depends_on:
      - postgres

volumes:
  postgres_dev_data:
    driver: local

networks:
  cms_dev_network:
    driver: bridge
