# docker/docker-compose.prod.yml
# Production Docker Compose для мультитенантной CMS
# Использует зеркала Docker для РФ

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: dockerhub1.beget.ru/library/postgres:16-alpine
    container_name: ${CLIENT_NAME:-client}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-payload}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-payload_secret}
      POSTGRES_DB: ${DB_NAME:-payload}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - cms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-payload} -d ${DB_NAME:-payload}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Payload CMS Backend
  cms:
    image: ghcr.io/${GITHUB_OWNER:-andreyvoyage}/cms:${VERSION:-latest}
    container_name: ${CLIENT_NAME:-client}_cms
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URI: postgres://${DB_USER:-payload}:${DB_PASSWORD:-payload_secret}@postgres:5432/${DB_NAME:-payload}
      # Payload
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-your-secret-key-here}
      PAYLOAD_PUBLIC_SERVER_URL: ${CMS_URL:-http://localhost:3001}
      # Next.js
      NEXT_PUBLIC_SERVER_URL: ${WEB_URL:-http://localhost:3000}
      # Storage
      PAYLOAD_PUBLIC_UPLOAD_URL: ${CMS_URL:-http://localhost:3001}/media
      # Features
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # Node
      NODE_ENV: production
    volumes:
      - cms_uploads:/app/apps/cms/media
    networks:
      - cms_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend
  web:
    image: ghcr.io/${GITHUB_OWNER:-andreyvoyage}/web:${VERSION:-latest}
    container_name: ${CLIENT_NAME:-client}_web
    restart: unless-stopped
    depends_on:
      cms:
        condition: service_healthy
    environment:
      # CMS Connection
      NEXT_PUBLIC_CMS_URL: ${CMS_URL:-http://cms:3001}
      # Public URL
      NEXT_PUBLIC_SITE_URL: ${WEB_URL:-http://localhost:3000}
      # Revalidate token
      REVALIDATE_TOKEN: ${REVALIDATE_TOKEN:-secret-token}
      # Node
      NODE_ENV: production
    networks:
      - cms_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: dockerhub1.beget.ru/library/nginx:alpine
    container_name: ${CLIENT_NAME:-client}_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - cms
      - web
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - cms_network

volumes:
  postgres_data:
    driver: local
  cms_uploads:
    driver: local
  nginx_cache:
    driver: local

networks:
  cms_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
